name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up Node.js Environments
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Cache option removed because there is no package-lock.json yet
          
      - name: Install Dependencies
        # Changed from 'npm ci' to 'npm install' so it generates its own structure on the fly
        run: npm install 
        
      - name: Compile and Build React Bundle
        run: npm run build
        
      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4
        
      - name: Upload Compiled Static Site Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy Live App
        id: deployment
        uses: actions/deploy-pages@v4
