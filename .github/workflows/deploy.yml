name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master] # Triggers when you update your code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up Node.js Environments
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Compile and Build React Bundle
        run: npm run build
        
      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4
        
      - name: Upload Compiled Static Site Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Targets Vite's compilation directory
          
      - name: Deploy Live App
        id: deployment
        uses: actions/deploy-pages@v4
